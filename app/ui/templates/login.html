<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login — Career Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-indigo-50 to-blue-100 min-h-screen flex items-center justify-center">

<div class="w-full max-w-md">

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl px-8 py-10">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-8">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-4 shadow-lg">
                <span class="text-white font-bold text-3xl">C</span>
            </div>
            <h1 class="text-2xl font-bold text-gray-900">Career Agent</h1>
            <p class="text-sm text-gray-400 mt-1">Your AI Job Matching Assistant</p>
        </div>

        <!-- Error -->
        {% if error %}
        <div class="mb-4 px-4 py-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
            {{ error }}
        </div>
        {% endif %}

        <!-- Form -->
        <form method="post" action="/login" class="space-y-5">

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                    Username
                </label>
                <input
                    type="text"
                    name="username"
                    required
                    placeholder="Enter username"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                           focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                           transition-all"/>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">
                    Password
                </label>
                <input
                    type="password"
                    name="password"
                    required
                    placeholder="Enter password"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm
                           focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent
                           transition-all"/>
            </div>

            <button
                type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium
                       py-2.5 px-4 rounded-lg text-sm transition-all shadow-sm">
                Sign In
            </button>
        </form>

        <p class="text-center text-xs text-gray-400 mt-6">
            Career Agent — Personal use only
        </p>
    </div>
</div>

</body>
</html>
